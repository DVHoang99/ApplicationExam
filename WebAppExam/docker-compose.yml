  redis:
    image: redis/redis-stack:latest
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"   # Redis Port
      - "8001:8001"   # Redis Insight GUI Port
    environment:
      - REDIS_ARGS=--requirepass adminpassword
    volumes:
      - redis_data:/data

